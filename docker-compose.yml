services:
  postgres:
    image: postgres:16-alpine
    container_name: telegram-rag-bot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: telegram_rag_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d telegram_rag_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: