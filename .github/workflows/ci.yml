name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
          POSTGRES_DB: telegram_rag_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bot -d telegram_rag_bot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bot:bot@localhost:5432/telegram_rag_bot?schema=public
      BOT_TOKEN: "000000000:TEST_TOKEN_FOR_CI_ONLY"
      ADMIN_USER_IDS: "1"
      BOT_INSTANCE_ID: default

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Run tests
        run: npm run test

      - name: Build TypeScript
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t telegram-rag-bot:ci .