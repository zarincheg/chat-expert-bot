name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git sha)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - test
    outputs:
      image_tag: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "version=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: vars.DEPLOY_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            cat > .env.prod << 'ENVEOF'
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            ADMIN_USER_IDS=${{ secrets.ADMIN_USER_IDS }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            BOT_INSTANCE_ID=${{ vars.BOT_INSTANCE_ID || 'default' }}
            BOT_IMAGE=ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.image_tag }}
            SYNC_SCHEDULER_ENABLED=${{ vars.SYNC_SCHEDULER_ENABLED || 'true' }}
            RAG_QUERY_URL=${{ secrets.RAG_QUERY_URL }}
            RAG_INGEST_URL=${{ secrets.RAG_INGEST_URL }}
            RAG_QUERY_API_KEY=${{ secrets.RAG_QUERY_API_KEY }}
            RAG_INGEST_API_KEY=${{ secrets.RAG_INGEST_API_KEY }}
            RAG_FALLBACK_LOCAL=${{ vars.RAG_FALLBACK_LOCAL || 'true' }}
            RUN_DB_SEED=false
            ENVEOF
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=30 bot